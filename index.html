<!DOCTYPE html>
<html lang="en" class="theme-scrollbar overflow-x-hidden">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="src/css/output.css">
    <link rel="shortcut icon" href="src/imgs/d_favicon.ico" type="image/x-icon" id="favicon">
    <link rel="stylesheet" href="https://unpkg.com/lenis@1.3.25/dist/lenis.css">
    <title>Ujjwal</title>
</head>

<body class="dark:bg-charcoal bg-whity 
            dark:text-whity text-charcoal
            min-h-dvh w-dvw 
            relative">

    <!-- theme change animation element(s) -->
    <div class="fixed inset-0 flex justify-center items-center overflow-hidden -z-50 pointer-events-none" id="transit">
        <div class="w-dvh h-dvh md:w-dvw md:h-dvw rounded-full relative before:-translate-y-1/2 before:translate-x-1/2
                before:content-[''] before:block before:w-full before:h-full before:rounded-full before:bg-(--c)
                before:scale-0 before:transition-transform before:duration-500 before:ease-in-out" id="ripple"></div>
    </div>

    <div class="headers h-16 w-dvw fixed top-0 z-50">
        <!-- site secrete indicator -->
        <div class="indicator
                after:content-['']
                flex items-center justify-center shrink-0

                h-3 w-3 -z-20 after:h-12 after:w-12 after:z-20
                top-8 left-8
                rounded-full after:rounded-full
                dark:bg-indicator/50 bg-indicator/80 after:backdrop-blur-md
                absolute after:absolute

                animate-[fade-out_linear_both]
                [animation-timeline:scroll(root)]

        "></div>

        <!-- theme change btn -->
        <button type="button" id="theme" class="pop g-btn glow">
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none"
                stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="icon"
                id="icon">
            </svg>
        </button>
    </div>


    <main class="w-full relative">

        <!-- the main upper section -->
        <section class="upper sticky top-0 min-h-dvh w-full px-4 z-10 mx-auto
                flex flex-col md:grid md:grid-cols-3 lg:grid-cols-5
                max-w-7xl gap-6 items-center justify-center overflow-hidden py-16 md:py-0
                ">


            <div class="pic 
                    col-span-1 md:col-span-2 lg:col-span-3
                    overflow-hidden
                    gap-y-0
                    flex justify-center
                    max:w-2xl h-100 sm:h-200
                    translate-y-7
                    ">
                <img src="src/imgs/u2.png" class="
                                                w-full h-full
                                                object-cover object-top
                                                drop-shadow-xl
                                                drop-shadow-charcoal dark:drop-shadow-black
                                                " alt="">
            </div>

            <div class="pop glow txt">
                <p class="info"> <strong class="highlight">Name:</strong> Ujjwal Aggarwal</p>
                <p class="info"> <strong class="highlight">University:</strong> Lovely Professional University</p>
                <p class="info"> <strong class="highlight">Passion:</strong> Coding</p>
            </div>

        </section>

        <section class="relative md:sticky md:top-0 h-dvh w-full z-20 px-4
                dark:bg-charcoal bg-whity border-t border-neutral-200 dark:border-neutral-800
                flex flex-col items-center justify-center shadow-2xl">

            <h1>bsing</h1>

        </section>

    </main>


<script src="https://unpkg.com/lenis@1.3.25/dist/lenis.min.js"></script>
<script src="src/js/style.js"></script>
<script src="src/js/index.js"></script>
</body>

</html>
