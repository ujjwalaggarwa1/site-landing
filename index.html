<!DOCTYPE html>
<html lang="en" class="overflow-x-hidden">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="src/css/output.css">
    <title>Ujjwal</title>
    <style>
        .txt::before:hover{opacity: 1;}
    </style>
</head>
<body class="dark:bg-charcoal bg-whity 
            dark:text-whity text-charcoal
            min-h-dvh w-dvw 
            flex justify-center items-center flex-wrap
            p-4">
    
    <div class="absolute inset-0 flex justify-center items-center overflow-hidden -z-50 pointer-events-none" id="transit">
        <div class="w-dvh h-dvh md:w-dvw md:h-dvw rounded-full relative before:-translate-y-1/2 before:translate-x-1/2
                before:content-[''] before:block before:w-full before:h-full before:rounded-full before:bg-(--c)
                before:scale-0 before:transition-transform before:duration-500 before:ease-in-out" 
            id="ripple"></div></div>
    </div>

    <button type="button" id="theme"  class="pop g-btn glow ">
    
        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="icon" id="icon">
        </svg>
        
    </button>
    

    <div class="indicator
                after:content-['']
                h-3 w-3 -z-20 after:h-12 after:w-12 after:z-20
                top-6 left-6
                rounded-full after:rounded-full
                dark:bg-red-700/60 bg-red-700/60 after:backdrop-blur-md
                after:-translate-x-1/3 after:-translate-y-1/3

                absolute after:absolute after:inset-0
                "></div>

    <!-- <h2 class="text-charcoal dark:text-whity text-3xl">DARK MODE</h2> -->
    <div class="upper
                grid grid-cols-1 md:grid-cols-3 lg:grid-cols-5
                w-full max-w-7xl gap-6
                items-center
                m-2 mt-16">


        <div class="pic 
                    col-span-1 md:col-span-2 lg:col-span-3
                    overflow-hidden
                    gap-y-0
                    flex justify-center
                    max:w-2xl h-100 sm:h-200
                    translate-y-7
                    ">
                <img src="src/imgs/u2.png" class="
                                                w-full h-full
                                                object-cover object-top
                                                " alt="">
        </div>

        <div class="pop glow txt">
                <p class="info"> <strong class="highlight">Name: </strong> Ujjwal Aggarwal</p>
                <p class="info"> <strong class="highlight">Academics: </strong> Incoming Computer Science undergraduate</p>
                <p class="info"> <strong class="highlight">University: </strong> Lovely Professional University</p>
                </div>

    </div>

<script src="src/js/style.js"></script>
<script src="src/js/index.js"></script>
</body>
</html>
